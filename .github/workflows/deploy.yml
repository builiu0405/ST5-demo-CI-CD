name: CI/CD Docker Hub 
 
on: 
  push: 
    branches: [ "master" ] 
 
jobs: 
  build-and-push: 
    runs-on: ubuntu-latest 
 
    steps: 
      # 1. Action lấy code từ GitHub
      - name: Checkout repository 
        uses: actions/checkout@v4 
 
      # 2. Action Đăng nhập Docker Hub
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with: 
         
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
 
      # 3. Action Đóng gói & Đẩy Image
      - name: Build and push Docker image 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 

          tags: |
            lieu245/duanjava:v${{ github.run_number }}
            lieu245/duanjava:latest
      - name: Triển khai lên DevOps Classroom
        run: |
           REPO="lieu245/duanjava"
           CONTAINER_PORT=80
           RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT")
           BODY=$(echo "$RESPONSE" | sed "$d")
           CODE=$(echo "$RESPONSE" | tail -n1)
           echo "Webhook HTTP: $CODE"
           if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
             echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
             echo "::group::Chi tiết webhook JSON"
             echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
             echo "::endgroup::"
             exit 1
           fi
           echo "Deploy thành công."
           echo "::group::Chi tiết webhook JSON"
           echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
           echo "::endgroup::"
