name: CI/CD Docker Hub 
 
on: 
  push: 
    branches: [ "master" ] 
 
jobs: 
  build-and-push: 
    runs-on: ubuntu-latest 
 
    steps: 
      # 1. Action lấy code từ GitHub
      - name: Checkout repository 
        uses: actions/checkout@v4 
 
      # 2. Action Đăng nhập Docker Hub
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with: 
         
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
 
      # 3. Action Đóng gói & Đẩy Image
      - name: Build and push Docker image 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lieu245/duanjava:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lieu245/duanjava:latest
