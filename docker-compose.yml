services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: buithibichlieu-app:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/buidb?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=bui
      - SPRING_DATASOURCE_PASSWORD=secret
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0.33
    container_name: bui-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=secretroot
      - MYSQL_DATABASE=buidb
      - MYSQL_USER=bui
      - MYSQL_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
